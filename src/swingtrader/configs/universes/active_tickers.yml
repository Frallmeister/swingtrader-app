kind: active_tickers
description: >
  Declare which tickers the model is allowed to train on.
  Market data will only be downloaded for included tickers.
universes:
  - list_name: se_large_cap
    include: all
    exclude:
      - YUBICO.ST
  - list_name: se_mid_cap
    include:
      - SBB-B.ST
      - NEOBO.ST
      - CIBUS.ST
      - APOTEA.ST
      - CLA-B.ST
      - HTRO.ST
      - INTRUM.ST
      - PCELL.ST